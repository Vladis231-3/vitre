version: "3.9"
services:
  postgres:
    image: postgres:16
    container_name: vitre-db
    environment:
      POSTGRES_DB: vitre
      POSTGRES_USER: vitre
      POSTGRES_PASSWORD: vitre_secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: vitre-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@vitre.ru
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  pgdata:
